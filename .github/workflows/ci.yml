name: CI

on:
  pull_request:

jobs:
  backend:
    name: "Backend"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Install Tauri Requirements (Linux)"
        # ref: https://tauri.app/start/prerequisites/#linux
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: "Install Rust (Stable)"
        uses: dtolnay/rust-toolchain@stable

      - name: "Cache Rust Dependencies"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: "Check Rust Formatting"
        run: |
          cd src-tauri
          cargo fmt --all -- --check

      - name: "Run Clippy"
        run: |
          cd src-tauri
          cargo clippy -- -D warnings

      - name: "Run Backend Tests"
        run: |
          cd src-tauri
          cargo ci

      - name: "Check TypeScript Binding Diff"
        run: |
          cd src
          git diff --exit-code -- bindings/

  frontend:
    name: "Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Cache Bun modules"
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-modules-${{ hashFiles('bun.lock') }}

      - name: "Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "Install Frontend Dependencies"
        run: |
          bun install

      - name: "Check Frontend Diagnostics"
        run: |
          bun run check

      # ref: https://github.com/oven-sh/bun/issues/16976
      # Bug, if local runs pass, but CI fails
      # - name: "Test Frontend"
      #   run: |
      #     bun test

      - name: "Lint Frontend"
        run: |
          bun run lint
