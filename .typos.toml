[files]
extend-exclude = [
    "Cargo.lock",
    "bun.lock",
    "package-lock.json",
    "*.svg",
    "*.png",
    "*.jpg",
    "*.gif",
    "*.ico",
    "*.exe",
]
ignore-hidden = true
ignore-vcs = true

[default]
check-filename = true
check-file = true
locale = "en-us"

[default.extend-words]
improvie = "improvie"
