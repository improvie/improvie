[files]
extend-exclude = [
    "node_modules/**/*",
    ".svelte-kit/**/*",
    "build/**/*",
    ".github/**/*",
    "src-tauri/gen/**/*",
    "bun.lock",
    "package-lock.json",
    "src-tauri/Cargo.lock",
    "*.svg",
    "*.png",
    "*.jpg",
    "*.gif",
    "*.ico",
    "*.exe",
]
ignore-hidden = true
ignore-vcs = true

[default]
check-filename = true
check-file = true
locale = "en-us"

[default.extend-words]
improvie = "improvie"
