[package]
name = "improvie"
version = "0.1.0"
description = "This is a tauri app that improves movie(video) management."
authors = ["moriyoshi-kasuga"]
edition = "2021"

[features]
default = []
dev = []

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "improvie_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
improvie-app.workspace = true
improvie-shared.workspace = true

serde.workspace = true
serde_json.workspace = true
log.workspace = true
sqlx.workspace = true

tauri.workspace = true

# tauri plugin and config
tauri-plugin-opener = "2.2.2"
fix-path-env = { git = "https://github.com/tauri-apps/fix-path-env-rs" }
tauri-plugin-log = "2.2.0"

[workspace]
resolver = "2"
members = [
    "improvie-infra",
    "improvie-app",
    "improvie-domain",
    "improvie-shared",
]

[workspace.dependencies]
improvie-infra = { path = "improvie-infra" }
improvie-app = { path = "improvie-app" }
improvie-domain = { path = "improvie-domain" }
improvie-shared = { path = "improvie-shared" }

# tauri
tauri = { version = "2.1.1", features = [] }

# async/concurrency/parallelism
tokio = { version = "1.42.0", features = ["full"] }
crossbeam-utils = "0.8.21"
async-trait = "0.1.83"

# ser/de
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.134"

# utils
thiserror = "2.0.9"
itertools = "0.13.0"
chrono = { version = "0.4.39", features = ["serde"] }
ambassador = "0.4.1"

# macros
proc-macro2 = "1.0.92"
quote = "1.0.38"
syn = "2.0.93"
seq-macro = "0.3.5"

# others
log = "0.4.22"
uuid = { version = "1.10.0", features = [
    "v7",
    "fast-rng",
    "macro-diagnostics",
    "serde",
] }
sqlx = { version = "0.8.2", features = [
    "sqlite",
    "runtime-tokio-native-tls",
    "chrono",
    "uuid",
] }

[workspace.lints.rust]
nonstandard_style = { level = "warn", priority = -1 }
unreachable_pub = "warn"
unused_import_braces = "warn"
unused_lifetimes = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
print_stdout = "deny"
print_stderr = "deny"

needless_continue = "warn"
needless_for_each = "warn"
needless_raw_string_hashes = "warn"
needless_raw_strings = "warn"
